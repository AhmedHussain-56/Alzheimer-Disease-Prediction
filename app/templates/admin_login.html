{% extends "base.html" %} {% block title %}Admin Login - Alzheimer Disease
Prediction{% endblock %} {% block content %}
<div class="row min-vh-75 align-items-center justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div
        class="icon-circle bg-danger bg-opacity-10 text-danger p-4 rounded-circle d-inline-block mb-3"
      >
        <i class="fas fa-user-shield fa-2x"></i>
      </div>
      <h2 class="fw-bold text-dark">Admin Portal</h2>
      <p class="text-muted">Secure access for system administrators</p>
    </div>

    <div class="card shadow-lg border-0 rounded-3">
      <div class="card-body p-4 p-sm-5">
        <form method="POST">
          <div class="mb-4">
            <label
              for="username"
              class="form-label text-uppercase small fw-bold text-muted ls-1"
              >Username</label
            >
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"
                ><i class="fas fa-user text-muted"></i
              ></span>
              <input
                type="text"
                class="form-control bg-light border-start-0 ps-0"
                id="username"
                name="username"
                placeholder="Enter admin username"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <label
              for="password"
              class="form-label text-uppercase small fw-bold text-muted ls-1"
              >Password</label
            >
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"
                ><i class="fas fa-lock text-muted"></i
              ></span>
              <input
                type="password"
                class="form-control bg-light border-start-0 ps-0"
                id="password"
                name="password"
                placeholder="Enter admin password"
                required
              />
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-danger btn-lg shadow-sm">
              <i class="fas fa-key me-2"></i> Access Dashboard
            </button>
          </div>
        </form>
      </div>
      <div
        class="card-footer bg-light border-0 py-3 text-center rounded-bottom-3"
      >
        <a
          href="{{ url_for('auth.login') }}"
          class="text-decoration-none text-muted small"
        >
          <i class="fas fa-arrow-left me-1"></i> Return to User Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
