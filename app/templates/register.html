{% extends "base.html" %} {% block title %}Register - Alzheimer Disease
Prediction{% endblock %} {% block content %}
<div
  class="row justify-content-center align-items-center"
  style="min-height: 80vh"
>
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-lg border-0 my-5">
      <div class="card-header bg-white text-center pb-0 border-0 pt-4">
        <h3 class="mb-1 text-primary">Create Account</h3>
        <p class="text-muted">Join the Alzheimer Disease Prediction platform</p>
      </div>
      <div class="card-body p-4 pt-2">
        <form method="POST">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="first_name" class="form-label">First Name</label>
              <input
                type="text"
                class="form-control"
                id="first_name"
                name="first_name"
                placeholder="John"
                required
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="last_name" class="form-label">Last Name</label>
              <input
                type="text"
                class="form-control"
                id="last_name"
                name="last_name"
                placeholder="Doe"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"
                ><i class="fas fa-user text-muted"></i
              ></span>
              <input
                type="text"
                class="form-control border-start-0 ps-0"
                id="username"
                name="username"
                placeholder="Choose a username"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"
                ><i class="fas fa-envelope text-muted"></i
              ></span>
              <input
                type="email"
                class="form-control border-start-0 ps-0"
                id="email"
                name="email"
                placeholder="john@example.com"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"
                ><i class="fas fa-phone text-muted"></i
              ></span>
              <input
                type="tel"
                class="form-control border-start-0 ps-0"
                id="phone"
                name="phone"
                placeholder="+1 234 567 8900"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"
                ><i class="fas fa-lock text-muted"></i
              ></span>
              <input
                type="password"
                class="form-control border-start-0 ps-0"
                id="password"
                name="password"
                placeholder="Create a strong password"
                required
              />
            </div>
            <div class="form-text text-muted small mt-1">
              Must be at least 8 characters long.
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">
            <i class="fas fa-user-plus me-1"></i> Register Account
          </button>
        </form>

        <div class="text-center">
          <p class="mb-0 text-muted">
            Already have an account?
            <a
              href="{{ url_for('auth.login') }}"
              class="fw-bold text-decoration-none"
              >Sign In</a
            >
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
